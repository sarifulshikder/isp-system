version: '3.8'

services:

  # ── PHP + Apache ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: isp_app
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      DB_HOST: db
      DB_USER: isp_user
      DB_PASS: isp_pass123
      DB_NAME: isp_db
    volumes:
      - .:/var/www/html
      - app_logs:/var/log/apache2
    depends_on:
      db:
        condition: service_healthy
    networks:
      - isp_network

  # ── FreeRADIUS ──────────────────────────────────────────
  radius:
    image: freeradius/freeradius-server:latest
    container_name: isp_radius
    restart: unless-stopped
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    networks:
      - isp_network
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./radius/config:/etc/freeradius
      - ./radius/logs:/var/log/freeradius
    environment:
      DB_HOST: db
      DB_USER: isp_user
      DB_PASS: isp_pass123
      DB_NAME: isp_db

  # ── MySQL ─────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: isp_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: isp_db
      MYSQL_USER: isp_user
      MYSQL_PASSWORD: ${DB_PASS}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - isp_network

  # ── phpMyAdmin ────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: isp_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: rootpass123
      UPLOAD_LIMIT: 64M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - isp_network

volumes:
  db_data:
  app_logs:

networks:
  isp_network:
    driver: bridge
